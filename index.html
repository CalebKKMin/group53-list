<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026년 청년 53교구 순별 리스트</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --primary-dark: #3730a3;
      --secondary: #06b6d4;
      --accent: #f59e0b;
      --male: #3b82f6;
      --female: #ec4899;
      --leader: #7c3aed;
      --vleader: #0891b2;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -1px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 25px -5px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, '맑은 고딕', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      padding: 24px 20px 20px;
      text-align: center;
      color: #fff;
      box-shadow: var(--shadow-lg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
    header p  { font-size: .85rem; opacity: .85; margin-top: 4px; }

    /* ── 탭 네비 ── */
    .tab-nav {
      display: flex;
      overflow-x: auto;
      gap: 0;
      background: var(--primary-dark);
      scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 0 0 auto;
      padding: 10px 18px;
      font-size: .82rem;
      font-weight: 600;
      color: rgba(255,255,255,.65);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
    .tab-btn.active { color: #fff; border-bottom-color: var(--accent); }

    /* ── 필터 바 ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 90px;
      z-index: 90;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: .75rem; font-weight: 600; color: var(--text-muted); }
    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all .2s;
    }
    .chip:hover { border-color: var(--primary-light); color: var(--primary); }
    .chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .chip.male.active   { background: var(--male); border-color: var(--male); }
    .chip.female.active { background: var(--female); border-color: var(--female); }
    .chip.year.active   { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.leader.active  { background: var(--leader); border-color: var(--leader); }
    .chip.vleader.active { background: var(--vleader); border-color: var(--vleader); }
    .chip.member.active  { background: #10b981; border-color: #10b981; }

    /* ── 통계 바 ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 10px 16px;
      background: #f1f5f9;
      border-bottom: 1px solid var(--border);
      font-size: .78rem;
      flex-wrap: wrap;
    }
    .stat-item { display: flex; align-items: center; gap: 4px; }
    .stat-dot  { width: 8px; height: 8px; border-radius: 50%; }
    .stat-val  { font-weight: 700; }
    .stat-lbl  { color: var(--text-muted); }

    /* ── 카드 그리드 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
      position: relative;
      border: 2px solid transparent;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .card.role-leader  { border-color: var(--leader); }
    .card.role-vleader { border-color: var(--vleader); }

    .card-photo {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .no-photo {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    }
    .no-photo.male   { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
    .no-photo.female { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }

    .card-body { padding: 10px 10px 12px; }
    .card-role-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: .65rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .badge-leader  { background: #ede9fe; color: var(--leader); }
    .badge-vleader { background: #cffafe; color: var(--vleader); }
    .badge-member  { background: #f0fdf4; color: #16a34a; }

    .card-name {
      font-size: .92rem;
      font-weight: 700;
      color: var(--text);
    }
    .card-meta {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      font-size: .73rem;
    }
    .gender-tag {
      padding: 1px 7px;
      border-radius: 8px;
      font-weight: 600;
    }
    .gender-tag.남 { background: #dbeafe; color: var(--male); }
    .gender-tag.여 { background: #fce7f3; color: var(--female); }
    .year-tag {
      padding: 1px 7px;
      border-radius: 8px;
      background: #fef3c7;
      color: #92400e;
      font-weight: 600;
    }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 20px;
      max-width: 340px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,.35);
      animation: modalIn .25s ease;
    }
    @keyframes modalIn {
      from { transform: scale(.9) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);    opacity: 1; }
    }
    .modal-photo {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      background: linear-gradient(135deg, #ede9fe, #c7d2fe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }
    .modal-photo img { width: 100%; max-height: 260px; object-fit: cover; }
    .modal-content { padding: 20px; }
    .modal-role-badge {
      display: inline-flex;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .modal-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
    }
    .modal-group { font-size: .85rem; color: var(--text-muted); margin-top: 2px; }
    .modal-details {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .detail-box {
      flex: 1;
      background: var(--bg);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    .detail-box .d-label { font-size: .65rem; color: var(--text-muted); font-weight: 600; margin-bottom: 3px; }
    .detail-box .d-value { font-size: 1.1rem; font-weight: 800; }
    .modal-close {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .modal-close:hover { background: var(--primary-dark); }

    /* ── 전체보기 탭 ── */
    .group-section { margin-bottom: 28px; }
    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
    }
    .group-header .g-count {
      margin-left: auto;
      background: rgba(255,255,255,.25);
      padding: 2px 10px;
      border-radius: 10px;
      font-size: .78rem;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* ── 검색 ── */
    .search-wrap {
      padding: 12px 16px 0;
    }
    .search-input {
      width: 100%;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--primary-light); }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      header h1 { font-size: 1.2rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 12px; }
    }
    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <h1>⛪ 2026년 청년 53교구</h1>
  <p>순별 멤버 조회 시스템</p>
</header>

<!-- 순 탭 -->
<nav class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="all">전체보기</button>
</nav>

<!-- 필터 바 -->
<div class="filter-bar" id="filterBar">
  <div class="filter-group">
    <span class="filter-label">역할</span>
    <button class="chip active" data-role="all">전체</button>
    <button class="chip leader" data-role="순장">순장</button>
    <button class="chip vleader" data-role="부순장">부순장</button>
    <button class="chip member" data-role="순원">순원</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">성별</span>
    <button class="chip active" data-gender="all">전체</button>
    <button class="chip male" data-gender="남">남</button>
    <button class="chip female" data-gender="여">여</button>
  </div>
  <div class="filter-group" id="yearFilterGroup">
    <span class="filter-label">또래</span>
    <!-- JS로 동적 생성 -->
  </div>
</div>

<!-- 검색 -->
<div class="search-wrap">
  <input class="search-input" type="text" id="searchInput" placeholder="이름으로 검색..." />
</div>

<!-- 통계 -->
<div class="stats-bar" id="statsBar"></div>

<!-- 컨텐츠 -->
<div id="mainContent"></div>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div id="modalPhoto"></div>
    <div class="modal-content">
      <div id="modalRoleBadge"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-group" id="modalGroup"></div>
      <div class="modal-details">
        <div class="detail-box">
          <div class="d-label">성별</div>
          <div class="d-value" id="modalGender"></div>
        </div>
        <div class="detail-box">
          <div class="d-label">또래</div>
          <div class="d-value" id="modalYear"></div>
        </div>
      </div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">닫기</button>
    </div>
  </div>
</div>

<script>
let allGroups = [];
let currentTab = 'all';
let filterRole   = 'all';
let filterGender = 'all';
let filterYear   = 'all';
let searchQuery  = '';

async function init() {
  const res = await fetch('data.json');
  allGroups = await res.json();
  buildTabs();
  buildYearFilters();
  render();
}

function buildTabs() {
  const nav = document.getElementById('tabNav');
  allGroups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.tab = String(g.id);
    btn.textContent = g.name;
    nav.appendChild(btn);
  });
  nav.addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    nav.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
}

function buildYearFilters() {
  const years = new Set();
  allGroups.forEach(g => g.members.forEach(m => { if (m.year) years.add(m.year); }));
  const sorted = [...years].sort();
  const group = document.getElementById('yearFilterGroup');
  const allBtn = document.createElement('button');
  allBtn.className = 'chip year active';
  allBtn.dataset.year = 'all';
  allBtn.textContent = '전체';
  group.appendChild(allBtn);
  sorted.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'chip year';
    btn.dataset.year = y;
    btn.textContent = "'" + y + "년";
    group.appendChild(btn);
  });
  group.addEventListener('click', e => {
    const btn = e.target.closest('.chip');
    if (!btn || !btn.dataset.year) return;
    group.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterYear = btn.dataset.year;
    render();
  });
}

// 필터 버튼 이벤트
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  if (btn.dataset.role !== undefined) {
    document.querySelectorAll('[data-role]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterRole = btn.dataset.role;
    render();
  }
  if (btn.dataset.gender !== undefined) {
    document.querySelectorAll('[data-gender]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterGender = btn.dataset.gender;
    render();
  }
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

function getRole(role) {
  if (role === '순장') return '순장';
  if (role === '부순장') return '부순장';
  return '순원';
}

function applyFilters(members) {
  return members.filter(m => {
    const r = getRole(m.role);
    if (filterRole !== 'all' && r !== filterRole) return false;
    if (filterGender !== 'all' && m.gender.trim() !== filterGender) return false;
    if (filterYear !== 'all' && m.year !== filterYear) return false;
    if (searchQuery && !m.name.includes(searchQuery)) return false;
    return true;
  });
}

function sortMembers(members) {
  const order = { '순장': 0, '부순장': 1 };
  return [...members].sort((a, b) => {
    const oa = order[a.role] ?? 2;
    const ob = order[b.role] ?? 2;
    return oa - ob;
  });
}

function renderCard(m, groupName) {
  const role = getRole(m.role);
  const roleClass = role === '순장' ? 'role-leader' : role === '부순장' ? 'role-vleader' : '';
  const badgeClass = role === '순장' ? 'badge-leader' : role === '부순장' ? 'badge-vleader' : 'badge-member';
  const genderClass = m.gender.trim();

  const photoHTML = m.photo
    ? `<div class="card-photo"><img src="images/${m.photo}" alt="${m.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"no-photo ${genderClass}\\">${m.gender.trim()==='남'?'👨':'👩'}</div>'" /></div>`
    : `<div class="no-photo ${genderClass}">${m.gender.trim() === '남' ? '👨' : '👩'}</div>`;

  return `
    <div class="card ${roleClass}" onclick='openModal(${JSON.stringify(m)}, "${groupName}")'>
      ${photoHTML}
      <div class="card-body">
        <div class="card-role-badge ${badgeClass}">${role}</div>
        <div class="card-name">${m.name}</div>
        <div class="card-meta">
          <span class="gender-tag ${genderClass}">${m.gender.trim()}</span>
          <span class="year-tag">'${m.year}</span>
        </div>
      </div>
    </div>`;
}

function updateStats(members) {
  const total  = members.length;
  const male   = members.filter(m => m.gender.trim() === '남').length;
  const female = members.filter(m => m.gender.trim() === '여').length;
  const leaders = members.filter(m => m.role === '순장').length;
  const vleaders = members.filter(m => m.role === '부순장').length;
  const regular = members.filter(m => getRole(m.role) === '순원').length;

  document.getElementById('statsBar').innerHTML = `
    <span class="stat-item"><span class="stat-dot" style="background:#64748b"></span><span class="stat-val">${total}</span><span class="stat-lbl">명</span></span>
    <span class="stat-item"><span class="stat-dot" style="background:var(--male)"></span><span class="stat-val">${male}</span><span class="stat-lbl">남</span></span>
    <span class="stat-item"><span class="stat-dot" style="background:var(--female)"></span><span class="stat-val">${female}</span><span class="stat-lbl">여</span></span>
    <span class="stat-item"><span class="stat-dot" style="background:var(--leader)"></span><span class="stat-val">${leaders}</span><span class="stat-lbl">순장</span></span>
    <span class="stat-item"><span class="stat-dot" style="background:var(--vleader)"></span><span class="stat-val">${vleaders}</span><span class="stat-lbl">부순장</span></span>
    <span class="stat-item"><span class="stat-dot" style="background:#10b981"></span><span class="stat-val">${regular}</span><span class="stat-lbl">순원</span></span>
  `;
}

function render() {
  const content = document.getElementById('mainContent');

  if (currentTab === 'all') {
    // 전체보기
    let html = '';
    let allFiltered = [];
    allGroups.forEach(g => {
      const filtered = applyFilters(sortMembers(g.members));
      allFiltered.push(...filtered);
      if (filtered.length === 0) return;
      html += `
        <div class="group-section">
          <div class="group-header">
            <span>⛪ ${g.name}</span>
            <span class="g-count">${filtered.length}명</span>
          </div>
          <div class="grid">${filtered.map(m => renderCard(m, g.name)).join('')}</div>
        </div>`;
    });
    if (!html) html = `<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다.</p></div>`;
    content.innerHTML = html;
    updateStats(allFiltered);
  } else {
    const g = allGroups.find(g => String(g.id) === currentTab);
    if (!g) return;
    const filtered = applyFilters(sortMembers(g.members));
    updateStats(filtered);
    if (filtered.length === 0) {
      content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다.</p></div>`;
      return;
    }
    content.innerHTML = `<div class="grid">${filtered.map(m => renderCard(m, g.name)).join('')}</div>`;
  }
}

function openModal(member, groupName) {
  const role = getRole(member.role);
  const badgeClass = role === '순장' ? 'badge-leader' : role === '부순장' ? 'badge-vleader' : 'badge-member';
  const gClass = member.gender.trim();

  const photoEl = document.getElementById('modalPhoto');
  if (member.photo) {
    photoEl.innerHTML = `<div class="modal-photo"><img src="images/${member.photo}" alt="${member.name}" onerror="this.parentElement.innerHTML='${member.gender.trim()==='남'?'👨':'👩'}'" /></div>`;
  } else {
    photoEl.innerHTML = `<div class="modal-photo no-photo ${gClass}" style="font-size:5rem;height:180px">${member.gender.trim() === '남' ? '👨' : '👩'}</div>`;
  }

  document.getElementById('modalRoleBadge').innerHTML = `<span class="modal-role-badge ${badgeClass}">${role}</span>`;
  document.getElementById('modalName').textContent = member.name;
  document.getElementById('modalGroup').textContent = `53교구 ${groupName}`;
  document.getElementById('modalGender').textContent = member.gender.trim() === '남' ? '👨 남' : '👩 여';
  document.getElementById('modalYear').textContent = `'${member.year}년`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

init();
</script>
</body>
</html>
